<script>
async function getAllUsers() {
    clearMessage("usersMessage");
    try {
        const response = await fetch("/users");
        const data = await handleResponse(response);
        renderUsers(data);
        showMessage("usersMessage", "info", "Users loaded successfully.");
    } catch (error) {
        showMessage("usersMessage", "error", error.message);
    }
}

async function getUserById() {
    clearMessage("findMessage");
    try {
        const userId = document.getElementById("findUserId").value.trim();
        if (!userId) throw new Error("Please enter a user ID.");

        const response = await fetch(`/users/${userId}`);
        const data = await handleResponse(response);
        showMessage("findMessage", "info", JSON.stringify(data, null, 2));
    } catch (error) {
        showMessage("findMessage", "error", error.message);
    }
}

async function updateUser() {
    clearMessage("updateMessage");
    try {
        const userId = document.getElementById("updateUserId").value.trim();
        if (!userId) throw new Error("Please enter a user ID.");

        const payload = {
            user_name: document.getElementById("updateUserName").value.trim(),
            email: document.getElementById("updateEmail").value.trim(),
            password: document.getElementById("updatePassword").value
        };

        const response = await fetch(`/users/${userId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await handleResponse(response);
        showMessage("updateMessage", "success", `User updated successfully:\n${JSON.stringify(data, null, 2)}`);
        getAllUsers();
    } catch (error) {
        showMessage("updateMessage", "error", error.message);
    }
}

async function deleteUser() {
    clearMessage("deleteMessage");
    try {
        const userId = document.getElementById("deleteUserId").value.trim();
        if (!userId) throw new Error("Please enter a user ID.");

        const response = await fetch(`/users/${userId}`, {
            method: "DELETE"
        });

        const data = await handleResponse(response);
        showMessage("deleteMessage", "success", JSON.stringify(data, null, 2));
        getAllUsers();
    } catch (error) {
        showMessage("deleteMessage", "error", error.message);
    }
}

updateSessionUI();
getAllUsers();
</script>
